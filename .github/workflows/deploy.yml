# Workflow para compilar e implantar no GitHub Pages automaticamente
name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master  # Cobre caso sua branch principal seja main ou master

# Define as permissões necessárias para o token do GitHub Actions implantar no Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Permite apenas uma implantação ativa por vez
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar Dependências
        run: npm ci || npm install

      - name: Compilar Projeto (Build)
        run: npm run build

      - name: Configurar Páginas do GitHub
        uses: actions/configure-pages@v4

      - name: Enviar Artefatos (dist)
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Implantar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        
